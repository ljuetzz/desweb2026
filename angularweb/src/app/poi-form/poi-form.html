<h2>POI form</h2>

<p><b>{{ message }}</b></p>

<button (click)="fillExample()">Fill example</button>
<button (click)="clean()">Clean</button>

<br><br>

<form [formGroup]="controlsGroup">

  <label>ID</label>
  <input id="id" type="number" [formControl]="id" name="id">

  <br><br>

  <label>Name</label>
  <input id="name" type="text" [formControl]="name" name="name">

  <br><br>

  <label>Description</label>
  <input id="description" type="text" [formControl]="description" name="description">

  <br><br>

  <label>Category</label>
  <input id="category" type="text" [formControl]="category" name="category">

  <br><br>

  <label>Visited at</label>
  <input id="visitedAt" type="text" [formControl]="visitedAt" name="visitedAt">

  <br><br>

  <label>Rating</label>
  <input id="rating" type="number" [formControl]="rating" name="rating">

  <br><br>

  <label>Geometry WKT</label>
  <textarea id="geom" rows="2" cols="80" [formControl]="geom" name="geom"></textarea>

</form>

<br>

<button (click)="insert()" [disabled]="controlsGroup.invalid">Insert</button>
<button (click)="selectAll()">Select all</button>
<button (click)="selectOne()">Select one</button>
<button (click)="update()" [disabled]="controlsGroup.invalid">Update</button>
<button (click)="delete()">Delete</button>

<h3>Server answer</h3>
<pre>{{ answer }}</pre>
